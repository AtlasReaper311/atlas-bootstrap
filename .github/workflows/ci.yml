# CI gate for atlas-bootstrap: bash syntax, JSON validity, and full
# PowerShell AST parsing (pwsh ships on ubuntu runners), reported to
# #ci-cd via direct curl.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Bash syntax
        run: |
          bash -n bootstrap.sh
          bash -n lib/health-check.sh

      - name: JSON validity
        run: |
          jq . lib/repos.json > /dev/null
          jq . lib/services.json > /dev/null
          jq . lib/models.json > /dev/null

      - name: PowerShell AST parse
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @("bootstrap.ps1", "lib/portproxy.ps1", "lib/health-check.ps1")) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "PARSE ERRORS in ${file}:" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host "  $($_.Message) (line $($_.Extent.StartLineNumber))" }
              $failed = $true
            } else {
              Write-Host "ok $file"
            }
          }
          if ($failed) { exit 1 }

      - name: Notify #ci-cd
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          STATUS: ${{ job.status }}
        run: |
          [ -z "$WEBHOOK" ] && echo "no webhook secret; skipping" && exit 0
          if [ "$STATUS" = "success" ]; then COLOUR=4906624; ICON="🟢"; else COLOUR=14830410; ICON="🔴"; fi
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg icon "$ICON" \
            --arg status "$STATUS" \
            --arg run_url "$RUN_URL" \
            --argjson colour "$COLOUR" \
            '{
              username: "ci-cd",
              embeds: [{
                title: "atlas-bootstrap CI",
                description: ($icon + " bash -n + json + ps1 AST parse: " + $status),
                color: $colour,
                fields: [{name: "Run", value: ("[logs](" + $run_url + ")"), inline: true}],
                footer: {text: "Atlas Systems — Pipeline"}
              }]
            }')
          curl -sS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
