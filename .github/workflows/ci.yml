# CI gate for atlas-bootstrap: bash syntax, JSON validity, and full
# PowerShell AST parsing (pwsh ships on ubuntu runners), reported to
# #ci-cd via direct curl.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Bash syntax
        run: |
          bash -n bootstrap.sh
          bash -n lib/health-check.sh

      - name: JSON validity
        run: |
          jq . lib/repos.json > /dev/null
          jq . lib/services.json > /dev/null
          jq . lib/models.json > /dev/null

      - name: PowerShell AST parse
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @("bootstrap.ps1", "lib/portproxy.ps1", "lib/health-check.ps1")) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "PARSE ERRORS in ${file}:" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host "  $($_.Message) (line $($_.Extent.StartLineNumber))" }
              $failed = $true
            } else {
              Write-Host "ok $file"
            }
          }
          if ($failed) { exit 1 }

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: build
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.build.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
